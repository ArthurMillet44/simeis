# Ce workflow lance un script python qui contient les tests fonctionnels

name: Run functionals tests

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  run-functional-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache des dépendances Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}${{ hashFiles('**/*.rs') }}
          restore-keys: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install pytest requests

      - name: Build the server
        run: cargo build -p simeis-server

      - name: Start the server
        run: nohup cargo run -p simeis-server > server.log 2>&1 &

      - name: Wait for the server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/gamestats > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time, server logs:"
          cat server.log
          exit 1

      - name: Run functional tests
        run: pytest tests/test_functional.py -v
