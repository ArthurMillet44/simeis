# Ce workflow vérifie qu'une pull request cible bien le dépôt du fork
# et non le dépôt d'origine depuis lequel ce fork a été créé.
#
# Contexte : sur GitHub, quand on ouvre une PR depuis un fork, l'interface
# pré-sélectionne par défaut le dépôt d'origine du fork comme base, ce qui
# peut amener à ouvrir une PR au mauvais endroit par erreur.

name: Check PR base repository

# Se déclenche à chaque création ou mise à jour de pull request
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-base-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifie que la base de la PR est le fork et non l'upstream
        env:
          EXPECTED_REPO: "ArthurMillet44/simeis"
        run: |
          # Nom complet (owner/repo) du dépôt vers lequel la PR essaie de merger
          BASE_REPO="${{ github.event.pull_request.base.repo.full_name }}"

          # Dépôt attendu : le fork "ArthurMillet44/simeis"
          EXPECTED_REPO="ArthurMillet44/simeis"

          if [ "$BASE_REPO" != "$EXPECTED_REPO" ]; then
            echo "::error::Cette pull request cible '$BASE_REPO' au lieu de '$EXPECTED_REPO'. Merci de corriger la base de la PR pour qu'elle pointe vers ce fork."
            exit 1
          fi

          echo "OK : la PR cible bien le bon dépôt."